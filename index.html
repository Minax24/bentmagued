<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eh ra2iek nenzl al weekend da ?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    :root {
      --bg-color: #ffe6f2;
      --card-bg: #ffffff;
      --primary-pink: #ff4d8d;
      --primary-pink-dark: #e02367;
      --text-dark: #2d1f2d;
      --text-muted: #88607a;
      --border-color: #ffd1e4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle, #ffe6f2 0%, #ffd1e8 100%);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* Goofy Swaying Card Container */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 24px 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(255, 77, 141, 0.15);
      border: 3px solid var(--border-color);
      text-align: center;
      position: relative;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      animation: floatSway 4s ease-in-out infinite;
    }

    @keyframes floatSway {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(1deg); }
    }

    /* Screen Visibility Handling */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .screen.active {
      display: flex;
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Image Styling */
    .question-img {
      width: 100%;
      max-width: 230px;
      height: auto;
      border-radius: 18px;
      margin-bottom: 12px;
      border: 3px solid var(--border-color);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
      object-fit: cover;
    }

    /* Typography */
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--text-dark);
      line-height: 1.25;
      letter-spacing: -0.5px;
      word-wrap: break-word;
    }

    /* Buttons */
    .btn {
      background-color: var(--primary-pink);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
      box-shadow: 0 6px 16px rgba(255, 77, 141, 0.4);
      outline: none;
      white-space: nowrap;
    }

    .btn:hover {
      background-color: var(--primary-pink-dark);
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background-color: #eedce4;
      color: var(--text-dark);
      box-shadow: none;
    }

    /* Side-by-side Button Container */
    .btn-group {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      position: relative;
      margin-top: 12px;
      min-height: 110px;
    }

    /* Dedicated slot for YES button */
    .yes-btn-wrapper {
      z-index: 10;
      margin-right: 110px;
    }

    /* Wrapper for "No" Button + dynamic message below it */
    .no-btn-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: absolute;
      left: calc(50% + 10px);
      top: 0;
      transition: top 0.15s ease, left 0.15s ease;
      z-index: 20;
      max-width: 90vw;
    }

    /* Clear, readable message styling adapted for small screens */
    .no-message {
      font-size: 0.8rem;
      font-weight: 800;
      color: #000000;
      margin-top: 6px;
      text-align: center;
      background: rgba(255, 255, 255, 0.96);
      padding: 4px 10px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      pointer-events: none;
      display: none;
      max-width: 85vw;
      word-break: break-word;
      white-space: normal;
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">

    <!-- STEP 1: Main Question -->
    <div class="screen active" id="step-1">
      <img src="meme.jpeg" alt="Meme" class="question-img" id="meme-img">
      <h1 id="main-title">Eh ra2iek nenzl al weekend da ?</h1>
      
      <div class="btn-group" id="btn-container">
        <div class="yes-btn-wrapper">
          <button class="btn" id="yes-btn" onclick="nextStep(2)">YES ♥</button>
        </div>
        
        <div class="no-btn-wrapper" id="no-wrapper">
          <button class="btn btn-secondary" id="no-btn">No</button>
          <div class="no-message" id="no-msg"></div>
        </div>
      </div>
    </div>

    <!-- STEP 2: Reaction Screen -->
    <div class="screen" id="step-2">
      <img src="yes_gif.gif" alt="Reaction GIF" class="question-img" id="reaction-img">
      <h1 id="reaction-title">Aiwa kda et3dli</h1>
    </div>

  </div>

  <script>
    let hasPressedNo = false;

    // File paths for images
    const yesDirectImgSrc = "yes_direct.jpeg"; 
    const yesAfterNoGifSrc = "yes_gif.gif";   

    // Screen Navigation
    function nextStep(stepNumber) {
      if (stepNumber === 2) {
        const reactionImg = document.getElementById('reaction-img');
        const reactionTitle = document.getElementById('reaction-title');

        if (hasPressedNo) {
          reactionImg.src = yesAfterNoGifSrc;
          reactionTitle.innerText = "Aiwa kda et3dli";
        } else {
          reactionImg.src = yesDirectImgSrc;
          reactionTitle.innerText = "Anty 7ad zo2 w mo7tram";
        }
      }

      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(`step-${stepNumber}`).classList.add('active');
    }

    // Evasive "No" Button
    const noBtn = document.getElementById('no-btn');
    const noWrapper = document.getElementById('no-wrapper');
    const noMsg = document.getElementById('no-msg');
    const memeImg = document.getElementById('meme-img');

    const messages = [
      "Ehh al waka7a di",
      "Hagblek shawerma",
      "Anty alilt al adb w matrbtish",
      "Tab bake rolz bl shata?",
      "Anty mosamema brdo?",
      "Tab aho"
    ];

    let attemptCount = 0;
    let currentX = 0;
    let currentY = 0;
    let isMoving = false;

    function moveNoButton(e) {
      if (e) e.preventDefault(); 

      if (isMoving) return;
      isMoving = true;
      setTimeout(() => { isMoving = false; }, 200);

      hasPressedNo = true;
      memeImg.src = "meme2.jpeg";

      if (attemptCount < messages.length) {
        noMsg.style.display = "block";
        noMsg.innerText = messages[attemptCount];
      }

      if (attemptCount === messages.length - 1) {
        setTimeout(() => {
          noBtn.style.display = "none";
        }, 150);
        return;
      }

      attemptCount++;

      const cardRect = document.getElementById('main-card').getBoundingClientRect();
      const containerRect = document.getElementById('btn-container').getBoundingClientRect();
      const wrapperRect = noWrapper.getBoundingClientRect();

      // Screen Safety Margins
      const margin = 12;
      const wWidth = Math.max(wrapperRect.width, 100);
      const wHeight = Math.max(wrapperRect.height, 50);

      // Strict boundaries based on card edges and viewport limits
      const minX = Math.max(-containerRect.left + margin + (wWidth / 2), -(cardRect.width / 2) + margin + (wWidth / 2));
      const maxX = Math.min((window.innerWidth - containerRect.left) - margin - (wWidth / 2), (cardRect.width / 2) - margin - (wWidth / 2));

      const titleRect = document.getElementById('main-title').getBoundingClientRect();
      const minY = Math.max(0, (titleRect.bottom - containerRect.top) + 6); 
      const maxY = Math.min(window.innerHeight - containerRect.top - wHeight - margin, cardRect.bottom - containerRect.top - wHeight - margin);

      let randomX, randomY, distance;
      const minDistance = 80;
      let tries = 0;

      do {
        randomX = minX + Math.random() * Math.max(10, maxX - minX);
        randomY = minY + Math.random() * Math.max(10, maxY - minY);
        
        distance = Math.hypot(randomX - currentX, randomY - currentY);
        tries++;
      } while (distance < minDistance && tries < 20);

      currentX = randomX;
      currentY = randomY;

      noWrapper.style.left = `calc(50% + ${randomX}px)`;
      noWrapper.style.top = `${randomY}px`;
    }

    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('touchstart', moveNoButton, { passive: false });
    noBtn.addEventListener('click', moveNoButton);
  </script>
</body>
</html>
