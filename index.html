<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eh ra2iek nenzl al weekend da ?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    :root {
      --bg-color: #ffe6f2;
      --card-bg: #ffffff;
      --primary-pink: #ff4d8d;
      --primary-pink-dark: #e02367;
      --text-dark: #2d1f2d;
      --text-muted: #88607a;
      --border-color: #ffd1e4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle, #ffe6f2 0%, #ffd1e8 100%);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* Goofy Swaying Card Container */
    .card {
      background: var(--card-bg);
      border-radius: 32px;
      padding: 32px 24px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 20px 40px rgba(255, 77, 141, 0.15);
      border: 3px solid var(--border-color);
      text-align: center;
      position: relative;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      animation: floatSway 4s ease-in-out infinite;
    }

    @keyframes floatSway {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    /* Screen Visibility Handling */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .screen.active {
      display: flex;
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Image Styling */
    .question-img {
      width: 100%;
      max-width: 250px;
      border-radius: 20px;
      margin-bottom: 16px;
      border: 3px solid var(--border-color);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
      object-fit: cover;
    }

    /* Typography */
    h1 {
      font-size: 1.7rem;
      font-weight: 900;
      margin-bottom: 12px;
      color: var(--text-dark);
      line-height: 1.25;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Buttons */
    .btn {
      background-color: var(--primary-pink);
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
      box-shadow: 0 6px 16px rgba(255, 77, 141, 0.4);
      outline: none;
    }

    .btn:hover {
      background-color: var(--primary-pink-dark);
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background-color: #eedce4;
      color: var(--text-dark);
      box-shadow: none;
    }

    /* Side-by-side Button Container */
    .btn-group {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      position: relative;
      margin-top: 12px;
      min-height: 120px;
    }

    /* Dedicated slot for YES button so it stays in place */
    .yes-btn-wrapper {
      z-index: 10;
      margin-right: 120px; /* Leaves space for NO button initially */
    }

    /* Wrapper for "No" Button + dynamic message below it */
    .no-btn-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: absolute;
      left: calc(50% + 10px);
      top: 0;
      transition: top 0.15s ease, left 0.15s ease;
      z-index: 20;
    }

    /* Clear, readable message styling with black text */
    .no-message {
      font-size: 0.85rem;
      font-weight: 800;
      color: #000000;
      margin-top: 6px;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.95);
      padding: 4px 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">

    <!-- STEP 1: Main Question -->
    <div class="screen active" id="step-1">
      <img src="meme.jpeg" alt="Meme" class="question-img" id="meme-img">
      <h1 id="main-title">Eh ra2iek nenzl al weekend da ?</h1>
      
      <div class="btn-group" id="btn-container">
        <div class="yes-btn-wrapper">
          <button class="btn" id="yes-btn" onclick="nextStep(2)">YES ♥</button>
        </div>
        
        <div class="no-btn-wrapper" id="no-wrapper">
          <button class="btn btn-secondary" id="no-btn">no ✨</button>
          <div class="no-message" id="no-msg"></div>
        </div>
      </div>
    </div>

    <!-- STEP 2: Reaction Screen -->
    <div class="screen" id="step-2">
      <img src="yes_gif.gif" alt="Reaction GIF" class="question-img" id="reaction-img">
      <h1 id="reaction-title">Aiwa kda et3dli</h1>
    </div>

  </div>

  <script>
    let hasPressedNo = false;

    // File paths for images
    const yesDirectImgSrc = "yes_direct.jpeg"; // Image for direct "YES" without pressing "NO"
    const yesAfterNoGifSrc = "yes_gif.gif";   // GIF for "YES" after pressing "NO"

    // Screen Navigation
    function nextStep(stepNumber) {
      if (stepNumber === 2) {
        const reactionImg = document.getElementById('reaction-img');
        const reactionTitle = document.getElementById('reaction-title');

        if (hasPressedNo) {
          // She tried pressing "NO" first
          reactionImg.src = yesAfterNoGifSrc;
          reactionTitle.innerText = "Aiwa kda et3dli";
        } else {
          // She pressed "YES" directly without pressing "NO"
          reactionImg.src = yesDirectImgSrc;
          reactionTitle.innerText = "Anty 7ad zo2 w mo7tram";
        }
      }

      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(`step-${stepNumber}`).classList.add('active');
    }

    // Evasive "No" Button with Message Sequence & Picture Swap
    const noBtn = document.getElementById('no-btn');
    const noWrapper = document.getElementById('no-wrapper');
    const noMsg = document.getElementById('no-msg');
    const memeImg = document.getElementById('meme-img');

    const messages = [
      "Ehh al waka7a di",
      "Hagblek shawerma",
      "Anty alilt al adb w matrbtish",
      "Tab bake rolz bl shata?",
      "Anty mosamema brdo?",
      "Tab aho"
    ];

    let attemptCount = 0;
    let currentX = 0;
    let currentY = 0;
    let isMoving = false; // Cooldown lock to prevent double triggering

    function moveNoButton(e) {
      if (e) e.preventDefault(); 

      // Prevent duplicate triggering from overlapping touch/click events
      if (isMoving) return;
      isMoving = true;
      setTimeout(() => { isMoving = false; }, 200);

      // Mark that "NO" was interacted with
      hasPressedNo = true;

      // Swap image to the new photo when interacting with "No"
      memeImg.src = "meme2.jpeg";

      // Display current message from sequence
      if (attemptCount < messages.length) {
        noMsg.style.display = "block";
        noMsg.innerText = messages[attemptCount];
      }

      // Final step: "tab aho" -> Hide button completely
      if (attemptCount === messages.length - 1) {
        setTimeout(() => {
          noBtn.style.display = "none";
        }, 150);
        return;
      }

      attemptCount++;

      const cardRect = document.getElementById('main-card').getBoundingClientRect();
      const containerRect = document.getElementById('btn-container').getBoundingClientRect();
      const wrapperRect = noWrapper.getBoundingClientRect();

      // Safe Padding to keep away from edges
      const safePadding = 16;
      const wrapperWidth = wrapperRect.width || 120;
      const wrapperHeight = wrapperRect.height || 60;

      // Calculate Horizontal Bounds inside Card
      const minX = - (containerRect.left - cardRect.left) + safePadding + (wrapperWidth / 2);
      const maxX = (cardRect.right - containerRect.left) - safePadding - (wrapperWidth / 2);

      // Calculate Vertical Bounds ONLY BELOW THE TITLE TEXT
      const titleRect = document.getElementById('main-title').getBoundingClientRect();
      const minY = Math.max(0, (titleRect.bottom - containerRect.top) + 8); 
      const maxY = (cardRect.bottom - containerRect.top) - safePadding - wrapperHeight;

      let randomX, randomY, distance;
      const minDistance = 90; // Keeps jumps active and noticeable

      let tries = 0;
      do {
        // Pick random position strictly below the title and inside the card bottom half
        randomX = minX + Math.random() * (maxX - minX) - (containerRect.width / 2);
        randomY = minY + Math.random() * Math.max(10, maxY - minY);
        
        distance = Math.hypot(randomX - currentX, randomY - currentY);
        tries++;
      } while (distance < minDistance && tries < 20);

      currentX = randomX;
      currentY = randomY;

      noWrapper.style.left = `calc(50% + ${randomX}px)`;
      noWrapper.style.top = `${randomY}px`;
    }

    // Desktop hover + Mobile tap evasion
    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('touchstart', moveNoButton, { passive: false });
    noBtn.addEventListener('click', moveNoButton);
  </script>
</body>
</html>
