<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mariam Bent Magued</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    :root {
      --bg-color: #ffe6f2;
      --card-bg: #ffffff;
      --primary-pink: #ff4d8d;
      --primary-pink-dark: #e02367;
      --text-dark: #2d1f2d;
      --text-muted: #88607a;
      --border-color: #ffd1e4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle, #ffe6f2 0%, #ffd1e8 100%);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* Goofy Swaying Card Container */
    .card {
      background: var(--card-bg);
      border-radius: 32px;
      padding: 32px 24px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 20px 40px rgba(255, 77, 141, 0.15);
      border: 3px solid var(--border-color);
      text-align: center;
      position: relative;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: floatSway 4s ease-in-out infinite;
    }

    @keyframes floatSway {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    /* Screen Visibility Handling */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .screen.active {
      display: flex;
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Image Styling with Smooth Opacity Transition */
    .question-img {
      width: 100%;
      max-width: 280px;
      border-radius: 20px;
      margin-bottom: 16px;
      border: 3px solid var(--border-color);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
      object-fit: cover;
      transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
      opacity: 1;
    }

    .question-img.fade-out {
      opacity: 0;
      transform: scale(0.95);
    }

    /* Typography */
    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--text-dark);
      line-height: 1.25;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Buttons */
    .btn {
      background-color: var(--primary-pink);
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
      box-shadow: 0 6px 16px rgba(255, 77, 141, 0.4);
      outline: none;
    }

    .btn:hover {
      background-color: var(--primary-pink-dark);
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background-color: #eedce4;
      color: var(--text-dark);
      box-shadow: none;
    }

    /* Side-by-side Button Container */
    .btn-group {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      width: 100%;
      position: relative;
      margin-top: 16px;
      min-height: 80px;
      padding-left: 15%; /* Keeps original YES button anchored neatly on the left side */
    }

    /* Dedicated slot for original YES button */
    .yes-btn-wrapper {
      position: relative;
      z-index: 10;
    }

    /* Wrapper for "No" Button + dynamic message below it */
    .no-btn-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: absolute;
      left: calc(50% + 20px); /* Initial position right next to YES button */
      top: 0;
      transition: top 0.15s ease, left 0.15s ease;
      z-index: 20;
    }

    /* Popup message styling */
    .no-message {
      font-size: 0.85rem;
      font-weight: 800;
      color: #ffffff;
      margin-top: 6px;
      white-space: nowrap;
      background-color: var(--primary-pink);
      padding: 6px 14px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(255, 77, 141, 0.3);
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">

    <!-- STEP 1: Main Question -->
    <div class="screen active" id="step-1">
      <img src="meme.jpeg" alt="Meme" class="question-img" id="meme-img">
      <h1 id="main-title">Eh ra2iek nenzl al weekend da?</h1>
      
      <div class="btn-group" id="btn-container">
        <div class="yes-btn-wrapper" id="yes-wrapper">
          <button class="btn" id="yes-btn" onclick="nextStep(2)">YES ♥</button>
        </div>
        
        <div class="no-btn-wrapper" id="no-wrapper">
          <button class="btn btn-secondary" id="no-btn">No</button>
          <div class="no-message" id="no-msg"></div>
        </div>
      </div>
    </div>

    <!-- STEP 2: Reaction Screen -->
    <div class="screen" id="step-2">
      <img src="yes_gif.gif" alt="Reaction GIF" class="question-img" id="reaction-img">
      <h1 id="reaction-title">Aiwa kda et3dli</h1>
    </div>

  </div>

  <script>
    let hasPressedNo = false;

    // File paths for images
    const yesDirectImgSrc = "yes_direct.jpeg"; // Image for direct "YES" without pressing "NO"
    const yesAfterNoGifSrc = "yes_gif.gif";   // GIF for "YES" after pressing "NO"

    // Helper function for smooth image source changes
    function changeImageSmoothly(imgElement, newSrc) {
      if (imgElement.src.includes(newSrc)) return; // Avoid redundant swaps
      
      imgElement.classList.add('fade-out');
      
      setTimeout(() => {
        imgElement.src = newSrc;
        // Fade back in once the image source is updated
        imgElement.onload = () => {
          imgElement.classList.remove('fade-out');
        };
        // Fallback in case image is already cached
        setTimeout(() => {
          imgElement.classList.remove('fade-out');
        }, 50);
      }, 150);
    }

    // Screen Navigation
    function nextStep(stepNumber) {
      if (stepNumber === 2) {
        const reactionImg = document.getElementById('reaction-img');
        const reactionTitle = document.getElementById('reaction-title');

        if (hasPressedNo) {
          // She tried pressing "NO" first
          changeImageSmoothly(reactionImg, yesAfterNoGifSrc);
          reactionTitle.innerText = "Aiwa kda et3dli";
          reactionTitle.style.fontSize = "1.8rem";
        } else {
          // She pressed "YES" directly without pressing "NO"
          changeImageSmoothly(reactionImg, yesDirectImgSrc);
          reactionTitle.innerText = "Anty 7ad zo2 w mo7tram";
          reactionTitle.style.fontSize = "1.35rem";
        }
      }

      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(`step-${stepNumber}`).classList.add('active');
    }

    // Evasive "No" Button with Message Sequence & Picture Swap
    const noBtn = document.getElementById('no-btn');
    const noWrapper = document.getElementById('no-wrapper');
    const yesWrapper = document.getElementById('yes-wrapper');
    const noMsg = document.getElementById('no-msg');
    const memeImg = document.getElementById('meme-img');

    const messages = [
      "Ehh al waka7a di",                       // 0
      "Hagblek shawerma",                       // 1
      "Tab bake rolz bl shata?",                // 2
      "Anty alilt el adab w matrbtish",          // 3
      "Anty mosamema ya3ni?",                    // 4 (Special Case Index)
      "Tab aho"                                 // 5
    ];

    let attemptCount = 0;
    let currentX = null;
    let currentY = null;
    let isMoving = false; // Cooldown lock to prevent double triggering

    function moveNoButton(e) {
      if (e) e.preventDefault(); 

      // Prevent duplicate triggering from overlapping touch/click events
      if (isMoving) return;
      isMoving = true;
      setTimeout(() => { isMoving = false; }, 200);

      // Mark that "NO" was interacted with
      hasPressedNo = true;

      const SPECIAL_CASE_INDEX = 4; // Index of "Anty mosamema ya3ni?"
      const isSpecialCase = attemptCount === SPECIAL_CASE_INDEX;

      // Dynamic Smooth Image Swap Logic
      if (isSpecialCase) {
        changeImageSmoothly(memeImg, "35994617.jpg");
      } else if (attemptCount >= 5) {
        changeImageSmoothly(memeImg, "images (6) (2)(1).jpeg");
      } else {
        changeImageSmoothly(memeImg, "meme2.jpeg");
      }

      // Display current message from sequence
      if (attemptCount < messages.length) {
        noMsg.style.display = "block";
        noMsg.innerText = messages[attemptCount];
      }

      // Final step: "Tab aho" -> Instantly remove the NO button
      if (attemptCount === messages.length - 1) {
        noBtn.style.display = "none"; // Instant disappearance without delay
        return;
      }

      const cardRect = document.getElementById('main-card').getBoundingClientRect();
      const containerRect = document.getElementById('btn-container').getBoundingClientRect();
      const yesRect = yesWrapper.getBoundingClientRect();
      const imgRect = memeImg.getBoundingClientRect();
      
      // Store initial CSS offsets relative to btn-container before first movement
      if (currentX === null || currentY === null) {
        const wrapperRectInitial = noWrapper.getBoundingClientRect();
        currentX = wrapperRectInitial.left - containerRect.left;
        currentY = wrapperRectInitial.top - containerRect.top;
      }

      // Get full wrapper size including the single-line message
      const wrapperRect = noWrapper.getBoundingClientRect();

      const margin = 12; // Safety margin around screen edges
      const wrapperWidth = wrapperRect.width || 120;
      const wrapperHeight = wrapperRect.height || 60;

      // Movement ranges across the card area
      const minX = - (containerRect.left - cardRect.left) + margin;
      const maxX = (cardRect.right - containerRect.left) - margin - wrapperWidth;

      const minY = - (containerRect.top - cardRect.top) + margin;
      const maxY = (cardRect.bottom - containerRect.top) - margin - wrapperHeight;

      let randomX, randomY, distance, overlapsYes, overlapsImage;
      
      // Forces a very large jump on the FIRST move (180px+ away from initial spot)
      const minDistance = (attemptCount === 0) ? 180 : 110;
      
      // Strict safety buffer padding around YES button to enforce strict separation (above, below, left, right)
      const yesBufferX = 25; 
      const yesBufferY = 25; 
      
      // Buffer for meme image
      const imgOverlapBuffer = isSpecialCase ? 20 : 10; 

      let tries = 0;
      do {
        // Pick random position across full card canvas
        randomX = minX + Math.random() * Math.max(10, maxX - minX);
        randomY = minY + Math.random() * Math.max(10, maxY - minY);

        // Precise boundary clamping against device screen edges to prevent cropping
        const absLeft = containerRect.left + randomX;
        const absTop = containerRect.top + randomY;

        if (absLeft < margin) {
          randomX += (margin - absLeft);
        } else if (absLeft + wrapperWidth > window.innerWidth - margin) {
          randomX -= ((absLeft + wrapperWidth) - (window.innerWidth - margin));
        }

        if (absTop < margin) {
          randomY += (margin - absTop);
        } else if (absTop + wrapperHeight > window.innerHeight - margin) {
          randomY -= ((absTop + wrapperHeight) - (window.innerHeight - margin));
        }

        // Check distance from current location
        distance = Math.hypot(randomX - currentX, randomY - currentY);

        // Calculate absolute position for bounding box checks
        const newAbsLeft = containerRect.left + randomX;
        const newAbsTop = containerRect.top + randomY;
        const newAbsRight = newAbsLeft + wrapperWidth;
        const newAbsBottom = newAbsTop + wrapperHeight;

        // Guaranteed spatial separation: No portion of NO wrapper can land inside YES button's zone (+ buffer)
        overlapsYes = !(
          newAbsRight < (yesRect.left - yesBufferX) ||
          newAbsLeft > (yesRect.right + yesBufferX) ||
          newAbsBottom < (yesRect.top - yesBufferY) ||
          newAbsTop > (yesRect.bottom + yesBufferY)
        );

        // Non-overlap check against Meme Image bounding box
        overlapsImage = !(
          newAbsRight < (imgRect.left - imgOverlapBuffer) ||
          newAbsLeft > (imgRect.right + imgOverlapBuffer) ||
          newAbsBottom < (imgRect.top - imgOverlapBuffer) ||
          newAbsTop > (imgRect.bottom + imgOverlapBuffer)
        );

        tries++;
      } while ((distance < minDistance || overlapsYes || overlapsImage) && tries < 200);

      currentX = randomX;
      currentY = randomY;
      attemptCount++;

      noWrapper.style.left = `${randomX}px`;
      noWrapper.style.top = `${randomY}px`;
    }

    // Desktop hover + Mobile tap evasion
    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('touchstart', moveNoButton, { passive: false });
    noBtn.addEventListener('click', moveNoButton);
  </script>
</body>
</html>
